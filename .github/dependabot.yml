version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 5
      semver-major-days: 7
      semver-minor-days: 5
      semver-patch-days: 3
    ignore:
      - dependency-name: "opencc"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
